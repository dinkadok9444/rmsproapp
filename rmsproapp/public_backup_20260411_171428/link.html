<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link in Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ffa3;
            --bg-dark: #020617;
            --base-font: 14px;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        .blob-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #00ffa3;
            top: -50px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #38bdf8;
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .profile-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 255, 163, 0.02));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 163, 0.05);
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .profile-img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--primary), #38bdf8);
            box-shadow: 0 0 25px rgba(0, 255, 163, 0.4);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #0f172a;
            border: 2px solid #020617;
        }

        .shop-name {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--text-color), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .shop-address {
            font-size: 13px;
            color: var(--text-color);
            opacity: 0.6;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            z-index: 1;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 700;
            font-size: var(--base-font);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .link-btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .link-btn:hover::before {
            left: 200%;
        }

        .link-icon {
            position: absolute;
            left: 25px;
            font-size: 22px;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50vh;
            color: var(--primary);
            z-index: 1;
        }

        .water-mark {
            margin-top: 40px;
            font-size: 11px;
            color: #475569;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .color-whatsapp { border-left: 3px solid #25D366; }
        .color-facebook { border-left: 3px solid #1877F2; }
        .color-instagram { border-left: 3px solid #E4405F; }
        .color-tiktok { border-left: 3px solid #ffffff; }
        .color-threads { border-left: 3px solid #ffffff; }
        .color-youtube { border-left: 3px solid #FF0000; }
        .color-shopee { border-left: 3px solid #EE4D2D; }

        .color-whatsapp:hover { box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); }
        .color-facebook:hover { box-shadow: 0 10px 25px rgba(24, 119, 242, 0.3); }
        .color-instagram:hover { box-shadow: 0 10px 25px rgba(228, 64, 95, 0.3); }
        .color-tiktok:hover { box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2); }
        .color-threads:hover { box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2); }
        .color-youtube:hover { box-shadow: 0 10px 25px rgba(255, 0, 0, 0.3); }
        .color-shopee:hover { box-shadow: 0 10px 25px rgba(238, 77, 45, 0.3); }

        /* ── LANGUAGE TOGGLE ── */
        .lang-toggle {
            position: fixed; top: 12px; right: 12px; z-index: 100;
            display: flex; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .lang-btn {
            padding: 6px 14px; font-size: 11px; font-weight: 800;
            cursor: pointer; border: none; font-family: 'Inter',sans-serif; transition: .2s;
        }
        .lang-btn.active { background: var(--primary); color: #000; }
        .lang-btn:not(.active) { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); }
    </style>
</head>
<body>

    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" id="btnBM" onclick="window._setLang('ms')">BM</button>
        <button class="lang-btn" id="btnEN" onclick="window._setLang('en')">EN</button>
    </div>

    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="loading" class="loader">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 15px;"></i>
        <p data-i18n="loading">Memuatkan Profil...</p>
    </div>

    <div id="mainContent" style="display: none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="profile-card">
            <div class="profile-img-container">
                <img id="shopLogo" class="profile-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23334155'%3E%3Cpath d='M21 16V4H3V16H21ZM21 18H3C1.89543 18 1 17.1046 1 16V4C1 2.89543 1.89543 2 3 2H21C22.1046 2 23 2.89543 23 4V16C23 17.1046 22.1046 18 21 18ZM5 20H19V22H5V20Z'/%3E%3C/svg%3E">
            </div>
            <h1 id="shopName" class="shop-name">NAMA KEDAI</h1>
            <p id="shopAddress" class="shop-address"><i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> <span data-i18n="no_address">Alamat tidak ditetapkan.</span></p>
        </div>

        <div id="linksContainer" class="links-container">
        </div>

        <div class="water-mark">
            Powered by Repair Management System
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ══ TRANSLATION SYSTEM ══
        const _T = {
            ms: {
                loading: 'Memuatkan Profil...',
                no_address: 'Alamat tidak ditetapkan.',
                error_link: 'Pautan tidak sah. ID atau Cawangan tiada.',
                error_load: 'Gagal memuat turun data.',
                no_profile: 'Profil kedai belum ditetapkan.',
                no_links: 'Tiada pautan dipaparkan.',
                whatsapp: 'WhatsApp Kami', facebook: 'Facebook', instagram: 'Instagram',
                tiktok: 'TikTok', threads: 'Threads', youtube: 'YouTube', shopee: 'Shopee',
                catalog_link: 'Katalog Telefon',
            },
            en: {
                loading: 'Loading Profile...',
                no_address: 'Address not set.',
                error_link: 'Invalid link. ID or branch not found.',
                error_load: 'Failed to load data.',
                no_profile: 'Shop profile has not been set up.',
                no_links: 'No links to display.',
                whatsapp: 'WhatsApp Us', facebook: 'Facebook', instagram: 'Instagram',
                tiktok: 'TikTok', threads: 'Threads', youtube: 'YouTube', shopee: 'Shopee',
                catalog_link: 'Phone Catalog',
            }
        };
        let _lang = localStorage.getItem('rms_lang') || 'ms';
        function _t(key) { return (_T[_lang] || _T.ms)[key] || key; }
        function _applyLang() {
            document.getElementById('btnBM').classList.toggle('active', _lang === 'ms');
            document.getElementById('btnEN').classList.toggle('active', _lang === 'en');
            document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = _t(el.dataset.i18n); });
        }
        window._setLang = function(lang) {
            _lang = lang;
            localStorage.setItem('rms_lang', lang);
            _applyLang();
        };
        _applyLang();

        const firebaseConfig = {
            apiKey: "AIzaSyAUgnpPUYe_uK2N7oBvoSnH40pADOV3JPA",
            authDomain: "rmspro-2f454.firebaseapp.com",
            projectId: "rmspro-2f454",
            storageBucket: "rmspro-2f454.firebasestorage.app",
            messagingSenderId: "94407896005",
            appId: "1:94407896005:web:42a2ab858a0b24280379ac",
            measurementId: "G-ZHN5J1C6EW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const _segments = window.location.pathname.split('/').filter(s => s.length > 0);
        let ownerID = null, shopID = null, _dealerCode = '';

        if (_segments.length >= 2 && _segments[0] === 'link') {
            // Format baru: /link/DEALER_CODE
            _dealerCode = _segments[1];
        } else if (_segments.length >= 3) {
            // Format lama: /dealerCode/shopID/link
            _dealerCode = _segments[0];
            shopID = _segments[1].toUpperCase();
        } else if (_segments.length === 2) {
            const first = _segments[0];
            if (window.location.hostname !== 'rmspro.net') {
                shopID = first.toUpperCase();
            } else {
                _dealerCode = first;
            }
        }
        // segments.length === 1: Custom domain /link — resolve dari domain

        // Fallback: query params
        const _params = new URLSearchParams(window.location.search);
        if (_params.get('id')) ownerID = _params.get('id');
        if (_params.get('shop')) shopID = _params.get('shop');

        // Resolve ownerID from dealerCode or domain
        async function resolveOwner() {
            if (!ownerID) {
                try {
                    let snap;
                    if (_dealerCode) {
                        snap = await getDocs(query(
                            collection(db, 'saas_dealers'),
                            where('dealerCode', '==', _dealerCode),
                            limit(1)
                        ));
                    } else if (window.location.hostname !== 'rmspro.net') {
                        snap = await getDocs(query(
                            collection(db, 'saas_dealers'),
                            where('domain', '==', 'https://' + window.location.hostname),
                            limit(1)
                        ));
                    }
                    if (snap && !snap.empty) {
                        ownerID = snap.docs[0].id.toLowerCase();
                        if (!shopID) {
                            try {
                                const branchSnap = await getDocs(query(
                                    collection(db, 'global_branches'),
                                    where('ownerID', '==', ownerID),
                                    limit(1)
                                ));
                                if (!branchSnap.empty) {
                                    const brId = branchSnap.docs[0].id;
                                    shopID = brId.includes('@') ? brId.split('@')[1] : 'MAIN';
                                } else {
                                    shopID = 'MAIN';
                                }
                            } catch(_) { shopID = 'MAIN'; }
                        }
                    }
                } catch (_) {}
            }
            muatTurunData();
        }
        resolveOwner();

        async function muatTurunData() {
            if (!ownerID || !shopID) {
                paparRalat(_t('error_link'));
                return;
            }

            // Load page theme
            try {
                const dealerSnap = await getDoc(doc(db, 'saas_dealers', ownerID.toLowerCase()));
                if (dealerSnap.exists()) {
                    const themes = dealerSnap.data().pageThemes || {};
                    const t = themes.link || {};
                    if (t.bgColor) {
                        document.documentElement.style.setProperty('--bg-dark', t.bgColor);
                        document.body.style.backgroundColor = t.bgColor;
                    }
                    if (t.textColor) {
                        document.documentElement.style.setProperty('--text-color', t.textColor);
                        document.body.style.color = t.textColor;
                    }
                    if (t.accentColor) document.documentElement.style.setProperty('--primary', t.accentColor);
                    if (t.fontSize) document.documentElement.style.setProperty('--base-font', t.fontSize + 'px');
                }
            } catch(_) {}

            try {
                const docRef = doc(db, `shop_bios_${ownerID.toLowerCase()}`, shopID.toUpperCase());
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    binaProfil(docSnap.data());
                } else {
                    paparRalat(_t('no_profile'));
                }
            } catch (error) {
                paparRalat(_t('error_load'));
            }
        }

        function binaProfil(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';

            if (data.namaKedai) document.getElementById('shopName').innerText = data.namaKedai;
            if (data.alamatKedai) document.getElementById('shopAddress').innerHTML = `<i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> ${data.alamatKedai}`;
            if (data.logoBase) document.getElementById('shopLogo').src = data.logoBase;

            const links = data.pautan || {};
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';

            const platformData = [
                { id: 'whatsapp', icon: 'fab fa-whatsapp', labelKey: 'whatsapp', colorClass: 'color-whatsapp', prefix: 'https://wa.me/' },
                { id: 'facebook', icon: 'fab fa-facebook', labelKey: 'facebook', colorClass: 'color-facebook', prefix: '' },
                { id: 'instagram', icon: 'fab fa-instagram', labelKey: 'instagram', colorClass: 'color-instagram', prefix: 'https://instagram.com/' },
                { id: 'tiktok', icon: 'fab fa-tiktok', labelKey: 'tiktok', colorClass: 'color-tiktok', prefix: 'https://tiktok.com/@' },
                { id: 'threads', icon: 'fab fa-threads', labelKey: 'threads', colorClass: 'color-threads', prefix: 'https://threads.net/@' },
                { id: 'youtube', icon: 'fab fa-youtube', labelKey: 'youtube', colorClass: 'color-youtube', prefix: '' },
                { id: 'shopee', icon: 'fas fa-shopping-cart', labelKey: 'shopee', colorClass: 'color-shopee', prefix: '' }
            ];

            let hasLinks = false;

            platformData.forEach(plat => {
                const val = links[plat.id];
                if (val && val.trim() !== '') {
                    hasLinks = true;
                    let finalUrl = val.trim();
                    if (plat.prefix && !finalUrl.startsWith('http')) {
                        finalUrl = plat.prefix + finalUrl.replace('@', '');
                    }

                    const a = document.createElement('a');
                    a.href = finalUrl;
                    a.target = '_blank';
                    a.className = `link-btn ${plat.colorClass}`;
                    a.innerHTML = `
                        <i class="${plat.icon} link-icon"></i>
                        <span>${_t(plat.labelKey)}</span>
                    `;
                    container.appendChild(a);
                }
            });

            // Auto add catalog link if enabled
            if (data.showCatalog === true) {
                hasLinks = true;
                const catalogUrl = `https://rmspro.net/catalog?owner=${ownerID.toLowerCase()}&shop=${shopID.toUpperCase()}`;
                const a = document.createElement('a');
                a.href = catalogUrl;
                a.target = '_blank';
                a.className = 'link-btn color-whatsapp';
                a.innerHTML = `
                    <i class="fas fa-mobile-screen-button link-icon"></i>
                    <span>${_t('catalog_link')}</span>
                `;
                container.appendChild(a);
            }

            if (!hasLinks) {
                container.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:13px; font-style:italic; margin-top:20px;">${_t('no_links')}</p>`;
            }
        }

        function paparRalat(mesej) {
            document.getElementById('loading').innerHTML = `
                <i class="fas fa-exclamation-triangle fa-3x" style="color: #f43f5e; margin-bottom: 15px;"></i>
                <p style="color:#cbd5e1;">${mesej}</p>
            `;
        }

    </script>
</body>
</html>
