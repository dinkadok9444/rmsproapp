<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Pelanggan - RMS PRO</title>
    <meta name="description" content="Isi borang untuk hantar maklumat repair anda.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --green: #00E676;
            --green-dark: #00C853;
            --dark: #0A0E17;
            --dark2: #111827;
            --dark3: #1F2937;
            --gray: #9CA3AF;
            --white: #FFFFFF;
            --blue: #3B82F6;
            --red: #EF4444;
            --yellow: #F59E0B;
            --border: #2A3040;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(10,14,23,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,230,118,0.1);
        }
        .nav-inner {
            max-width: 600px; margin: 0 auto;
            padding: 16px 24px;
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; color: #000;
        }
        .logo-text { font-weight: 900; font-size: 16px; letter-spacing: 1px; }
        .logo-sub { font-size: 10px; color: var(--gray); font-weight: 600; }

        .container {
            max-width: 600px; margin: 0 auto;
            padding: 90px 20px 40px;
        }

        .shop-header {
            text-align: center; margin-bottom: 24px;
            padding: 20px;
            background: var(--dark2);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .shop-name {
            font-size: 18px; font-weight: 900;
            color: var(--green);
            letter-spacing: 1px;
        }
        .shop-branch {
            font-size: 11px; color: var(--gray);
            margin-top: 4px; font-weight: 600;
        }

        .form-card {
            background: var(--dark2);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 16px;
        }
        .form-title {
            font-size: 13px; font-weight: 900;
            color: var(--green);
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: 10px; font-weight: 800;
            color: var(--gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input, .field textarea, .field select {
            width: 100%;
            padding: 12px 14px;
            background: var(--dark3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: var(--green);
        }
        .field input::placeholder, .field textarea::placeholder {
            color: #4B5563;
        }
        .field textarea { resize: vertical; min-height: 80px; }
        .field select option { background: var(--dark2); color: var(--white); }

        .row { display: flex; gap: 10px; }
        .row .field { flex: 1; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,230,118,0.3); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled {
            opacity: 0.5; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .success-card {
            display: none;
            text-align: center;
            padding: 40px 24px;
            background: var(--dark2);
            border-radius: 16px;
            border: 1px solid rgba(0,230,118,0.3);
        }
        .success-card .icon {
            width: 64px; height: 64px;
            background: rgba(0,230,118,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px; color: var(--green);
        }
        .success-card h2 {
            font-size: 18px; font-weight: 900;
            color: var(--green);
            margin-bottom: 8px;
        }
        .success-card p {
            font-size: 12px; color: var(--gray);
            line-height: 1.6;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 14px;
            font-size: 12px;
            color: var(--red);
            font-weight: 700;
        }

        .btn-add {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            background: rgba(0,230,118,0.1);
            border: 1px solid rgba(0,230,118,0.3);
            border-radius: 8px;
            color: var(--green);
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 800;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:hover { background: rgba(0,230,118,0.2); }
        .btn-remove {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 10px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px;
            color: var(--red);
            font-family: 'Inter', sans-serif;
            font-size: 10px; font-weight: 800;
            cursor: pointer;
        }
        .backup-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
        .backup-row input { flex: 1; }

        /* ── LANGUAGE TOGGLE ── */
        .lang-toggle {
            position: fixed; top: 12px; right: 12px; z-index: 200;
            display: flex; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .lang-btn {
            padding: 6px 14px; font-size: 11px; font-weight: 800;
            cursor: pointer; border: none; font-family: 'Inter',sans-serif; transition: .2s;
        }
        .lang-btn.active { background: var(--green); color: #000; }
        .lang-btn:not(.active) { background: rgba(255,255,255,.06); color: var(--gray); }

        /* Pattern grid */
        .pattern-grid {
            display: inline-grid;
            grid-template-columns: repeat(3, 40px);
            gap: 10px;
            margin-top: 8px;
        }
        .pattern-dot {
            width: 40px; height: 40px;
            background: var(--dark3);
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; color: var(--gray);
            transition: all 0.15s;
        }
        .pattern-dot.active {
            background: rgba(0,230,118,0.2);
            border-color: var(--green);
            color: var(--green);
        }
        .pattern-result {
            margin-top: 8px;
            font-size: 11px; color: var(--gray); font-weight: 700;
        }
        .pattern-clear {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 6px;
            color: var(--red);
            font-size: 10px; font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Language Toggle -->
<div class="lang-toggle">
    <button class="lang-btn active" id="btnBM" onclick="setLang('ms')">BM</button>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
</div>

<nav>
    <div class="nav-inner">
        <div class="logo-icon">R</div>
        <div>
            <div class="logo-text">RMS PRO</div>
            <div class="logo-sub" data-i18n="nav_sub">Borang Pelanggan</div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="shop-header">
        <div class="shop-name" id="shopName">Memuat...</div>
        <div class="shop-branch" id="shopBranch"></div>
    </div>

    <form id="formBorang" autocomplete="off">
        <div class="form-card">
            <div class="form-title"><i class="fas fa-user"></i> <span data-i18n="section_customer">MAKLUMAT PELANGGAN</span></div>
            <div class="field">
                <label data-i18n="lbl_nama">Nama Penuh *</label>
                <input type="text" id="nama" data-i18n-placeholder="ph_nama" placeholder="Nama penuh anda" required>
            </div>
            <div class="field">
                <label data-i18n="lbl_tel">No. Telefon *</label>
                <input type="tel" id="tel" data-i18n-placeholder="ph_tel" placeholder="011-12345678" required>
            </div>
            <div id="backupContainer"></div>
            <div style="margin-top:8px">
                <button type="button" class="btn-add" onclick="addBackup()">
                    <i class="fas fa-plus"></i> <span data-i18n="btn_add_backup">TAMBAH NO. BACKUP</span>
                </button>
            </div>
        </div>

        <div class="form-card">
            <div class="form-title"><i class="fas fa-mobile-screen-button"></i> <span data-i18n="section_device">MAKLUMAT PERANTI</span></div>
            <div class="field">
                <label data-i18n="lbl_model">Model Telefon *</label>
                <input type="text" id="model" data-i18n-placeholder="ph_model" placeholder="Cth: iPhone 15 Pro Max" required>
            </div>
            <div class="field">
                <label data-i18n="lbl_kerosakan">Kerosakan / Masalah *</label>
                <textarea id="kerosakan" data-i18n-placeholder="ph_kerosakan" placeholder="Terangkan masalah peranti anda..." required></textarea>
            </div>

            <div class="field">
                <label data-i18n="lbl_password">Password (jika ada)</label>
                <input type="text" id="password" data-i18n-placeholder="ph_password" placeholder="Tiada">
            </div>

            <div class="field">
                <label data-i18n="lbl_pattern">Pattern (jika ada)</label>
                <div class="pattern-grid" id="patternGrid"></div>
                <div class="pattern-result" id="patternResult">Tiada pattern dipilih</div>
                <span class="pattern-clear" onclick="clearPattern()" style="display:none" id="patternClear">
                    <i class="fas fa-xmark"></i> RESET
                </span>
                <input type="hidden" id="pattern" value="">
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <button type="submit" class="btn-submit" id="btnSubmit">
            <i class="fas fa-paper-plane"></i> <span data-i18n="btn_submit">HANTAR BORANG</span>
        </button>
    </form>

    <div class="success-card" id="successCard">
        <div class="icon"><i class="fas fa-circle-check"></i></div>
        <h2 data-i18n="success_title">BERJAYA DIHANTAR!</h2>
        <p data-i18n="success_desc">Terima kasih. Maklumat anda telah dihantar kepada kedai. Pihak kedai akan menghubungi anda untuk pengesahan.</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // ══ TRANSLATION SYSTEM ══
    const T = {
        ms: {
            nav_sub: 'Borang Pelanggan',
            section_customer: 'MAKLUMAT PELANGGAN',
            lbl_nama: 'Nama Penuh *', ph_nama: 'Nama penuh anda',
            lbl_tel: 'No. Telefon *', ph_tel: '011-12345678',
            section_device: 'MAKLUMAT PERANTI',
            lbl_model: 'Model Telefon *', ph_model: 'Cth: iPhone 15 Pro Max',
            lbl_kerosakan: 'Kerosakan / Masalah *', ph_kerosakan: 'Terangkan masalah peranti anda...',
            lbl_password: 'Password (jika ada)', ph_password: 'Tiada',
            lbl_pattern: 'Pattern (jika ada)',
            btn_add_backup: 'TAMBAH NO. BACKUP',
            btn_submit: 'HANTAR BORANG',
            btn_sending: 'MENGHANTAR...',
            success_title: 'BERJAYA DIHANTAR!',
            success_desc: 'Terima kasih. Maklumat anda telah dihantar kepada kedai. Pihak kedai akan menghubungi anda untuk pengesahan.',
            error_link: 'Link borang tidak sah. Sila minta link baru dari kedai.',
            error_required: 'Sila isi semua ruangan bertanda *.',
            error_submit: 'Gagal menghantar. Sila cuba lagi.',
            pattern_none: 'Tiada pattern dipilih',
            pattern_prefix: 'Pattern: ',
        },
        en: {
            nav_sub: 'Customer Form',
            section_customer: 'CUSTOMER INFORMATION',
            lbl_nama: 'Full Name *', ph_nama: 'Your full name',
            lbl_tel: 'Phone Number *', ph_tel: '011-12345678',
            section_device: 'DEVICE INFORMATION',
            lbl_model: 'Phone Model *', ph_model: 'E.g: iPhone 15 Pro Max',
            lbl_kerosakan: 'Damage / Problem *', ph_kerosakan: 'Describe your device problem...',
            lbl_password: 'Password (if any)', ph_password: 'None',
            lbl_pattern: 'Pattern (if any)',
            btn_add_backup: 'ADD BACKUP NUMBER',
            btn_submit: 'SUBMIT FORM',
            btn_sending: 'SUBMITTING...',
            success_title: 'SUCCESSFULLY SUBMITTED!',
            success_desc: 'Thank you. Your information has been sent to the shop. They will contact you for confirmation.',
            error_link: 'Invalid form link. Please request a new link from the shop.',
            error_required: 'Please fill in all required fields (*).',
            error_submit: 'Failed to submit. Please try again.',
            pattern_none: 'No pattern selected',
            pattern_prefix: 'Pattern: ',
        }
    };
    let currentLang = localStorage.getItem('rms_lang') || 'ms';
    function t(key) { return (T[currentLang] || T.ms)[key] || key; }
    function applyLang() {
        document.getElementById('btnBM').classList.toggle('active', currentLang === 'ms');
        document.getElementById('btnEN').classList.toggle('active', currentLang === 'en');
        document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
        // Update textarea placeholders too
        document.querySelectorAll('textarea[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
    }
    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('rms_lang', lang);
        applyLang();
    }
    document.addEventListener('DOMContentLoaded', applyLang);

    firebase.initializeApp({
        apiKey: 'AIzaSyCiCmpmEFnaZKx1OE84a2OgRDEn8E9Ulfk',
        projectId: 'rmspro-2f454',
        storageBucket: 'rmspro-2f454.firebasestorage.app',
        messagingSenderId: '94407896005',
        appId: '1:94407896005:android:201411fafcbd26a40379ac',
    });

    const db = firebase.firestore();

    const _segments = window.location.pathname.split('/').filter(s => s.length > 0);
    let ownerID = '', shopID = '', _dealerCode = '';

    if (_segments.length >= 2 && _segments[0] === 'borang') {
        // Format baru: /borang/DEALER_CODE
        _dealerCode = _segments[1];
    } else if (_segments.length >= 3) {
        // Format lama: /dealerCode/shopID/borang
        _dealerCode = _segments[0];
        shopID = _segments[1].toUpperCase();
    } else if (_segments.length === 2) {
        const first = _segments[0];
        if (window.location.hostname !== 'rmspro.net') {
            shopID = first.toUpperCase();
        } else {
            _dealerCode = first;
        }
    }
    // segments.length === 1: Custom domain /borang — resolve dari domain

    // Fallback: query params
    const _params = new URLSearchParams(window.location.search);
    if (_params.get('owner')) ownerID = _params.get('owner');
    if (_params.get('shop')) shopID = _params.get('shop');

    // Resolve ownerID from dealerCode or domain
    async function resolveOwner() {
        if (!ownerID) {
            try {
                let snap;
                if (_dealerCode) {
                    snap = await db.collection('saas_dealers')
                        .where('dealerCode', '==', _dealerCode)
                        .limit(1).get();
                } else if (window.location.hostname !== 'rmspro.net') {
                    snap = await db.collection('saas_dealers')
                        .where('domain', '==', 'https://' + window.location.hostname)
                        .limit(1).get();
                }
                if (snap && !snap.empty) {
                    ownerID = snap.docs[0].id.toLowerCase();
                    if (!shopID) {
                        try {
                            const brSnap = await db.collection('global_branches')
                                .where('ownerID', '==', ownerID)
                                .limit(1).get();
                            if (!brSnap.empty) {
                                const brId = brSnap.docs[0].id;
                                shopID = brId.includes('@') ? brId.split('@')[1] : 'MAIN';
                            } else { shopID = 'MAIN'; }
                        } catch(_) { shopID = 'MAIN'; }
                    }
                }
            } catch (_) {}
        }
        // Load page theme
        if (ownerID) {
            try {
                const dealerSnap = await db.collection('saas_dealers').doc(ownerID.toLowerCase()).get();
                if (dealerSnap.exists) {
                    const themes = dealerSnap.data().pageThemes || {};
                    const t = themes.borang || {};
                    if (t.bgColor) document.body.style.backgroundColor = t.bgColor;
                    if (t.textColor) document.body.style.color = t.textColor;
                    if (t.fontSize) document.body.style.fontSize = t.fontSize + 'px';
                }
            } catch(_) {}
        }
        loadShop();
    }
    resolveOwner();

    // Load shop info
    async function loadShop() {
        if (!ownerID) {
            document.getElementById('shopName').textContent = 'Link tidak sah';
            return;
        }
        try {
            const snap = await db.collection('shops_' + ownerID).doc(shopID).get();
            if (snap.exists) {
                const d = snap.data();
                document.getElementById('shopName').textContent = d.shopName || d.namaKedai || ownerID.toUpperCase();
                document.getElementById('shopBranch').textContent = 'Cawangan: ' + shopID;
            } else {
                // Try dealer info
                const dealerSnap = await db.collection('saas_dealers').doc(ownerID).get();
                if (dealerSnap.exists) {
                    document.getElementById('shopName').textContent = dealerSnap.data().namaKedai || ownerID.toUpperCase();
                    document.getElementById('shopBranch').textContent = 'Cawangan: ' + shopID;
                } else {
                    document.getElementById('shopName').textContent = ownerID.toUpperCase();
                    document.getElementById('shopBranch').textContent = shopID;
                }
            }
        } catch (e) {
            document.getElementById('shopName').textContent = ownerID.toUpperCase();
        }
    }
    // Backup numbers
    let backupCount = 0;
    function addBackup() {
        backupCount++;
        const container = document.getElementById('backupContainer');
        const row = document.createElement('div');
        row.className = 'backup-row';
        row.id = 'backup_row_' + backupCount;
        row.innerHTML = `
            <input type="tel" id="backup_${backupCount}" placeholder="No. backup ${backupCount}">
            <button type="button" class="btn-remove" onclick="removeBackup(${backupCount})">
                <i class="fas fa-xmark"></i>
            </button>
        `;
        container.appendChild(row);
    }
    function removeBackup(n) {
        const row = document.getElementById('backup_row_' + n);
        if (row) row.remove();
    }

    // Pattern grid — drag/swipe support
    const patternSelected = [];
    const patternGrid = document.getElementById('patternGrid');
    let isDragging = false;
    const dots = [];

    for (let i = 1; i <= 9; i++) {
        const dot = document.createElement('div');
        dot.className = 'pattern-dot';
        dot.textContent = i;
        dot.dataset.idx = i;
        dots.push(dot);
        patternGrid.appendChild(dot);
    }

    function addDot(idx) {
        if (patternSelected.includes(idx)) return;
        patternSelected.push(idx);
        dots[idx - 1].classList.add('active');
        updatePattern();
    }

    function getDotFromPoint(x, y) {
        for (const d of dots) {
            const r = d.getBoundingClientRect();
            if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
                return parseInt(d.dataset.idx);
            }
        }
        return null;
    }

    // Touch events
    patternGrid.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isDragging = true;
        const t = e.touches[0];
        const idx = getDotFromPoint(t.clientX, t.clientY);
        if (idx) addDot(idx);
    }, {passive: false});

    patternGrid.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!isDragging) return;
        const t = e.touches[0];
        const idx = getDotFromPoint(t.clientX, t.clientY);
        if (idx) addDot(idx);
    }, {passive: false});

    patternGrid.addEventListener('touchend', () => { isDragging = false; });

    // Mouse events
    patternGrid.addEventListener('mousedown', (e) => {
        isDragging = true;
        const idx = getDotFromPoint(e.clientX, e.clientY);
        if (idx) addDot(idx);
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const idx = getDotFromPoint(e.clientX, e.clientY);
        if (idx) addDot(idx);
    });
    document.addEventListener('mouseup', () => { isDragging = false; });

    function updatePattern() {
        const str = patternSelected.join('-');
        document.getElementById('pattern').value = str;
        document.getElementById('patternResult').textContent = t('pattern_prefix') + str;
        document.getElementById('patternClear').style.display = 'inline-block';
    }
    function clearPattern() {
        patternSelected.length = 0;
        document.getElementById('pattern').value = '';
        document.getElementById('patternResult').textContent = t('pattern_none');
        document.getElementById('patternClear').style.display = 'none';
        dots.forEach(d => d.classList.remove('active'));
    }

    // Submit form
    document.getElementById('formBorang').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const errorEl = document.getElementById('errorMsg');
        errorEl.style.display = 'none';

        if (!ownerID || !shopID) {
            errorEl.textContent = t('error_link');
            errorEl.style.display = 'block';
            return;
        }

        const nama = document.getElementById('nama').value.trim();
        const tel = document.getElementById('tel').value.trim();
        const model = document.getElementById('model').value.trim();
        const kerosakan = document.getElementById('kerosakan').value.trim();
        const password = document.getElementById('password').value.trim() || 'Tiada';
        const pattern = document.getElementById('pattern').value || '';

        // Collect backup numbers
        const backups = [];
        document.querySelectorAll('[id^="backup_"]').forEach(el => {
            if (el.tagName === 'INPUT' && el.value.trim()) backups.push(el.value.trim());
        });

        if (!nama || !tel || !model || !kerosakan) {
            errorEl.textContent = t('error_required');
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> MENGHANTAR...';

        try {
            await db.collection('customer_forms_' + ownerID).add({
                nama: nama.toUpperCase(),
                tel: tel,
                telBackup: backups,
                model: model.toUpperCase(),
                kerosakan: kerosakan,
                password: password,
                pattern: pattern,
                shopID: shopID,
                status: 'PENDING',
                timestamp: Date.now(),
                tarikh: new Date().toISOString(),
                source: 'BORANG_ONLINE',
            });

            document.getElementById('formBorang').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
        } catch (err) {
            errorEl.textContent = t('error_submit') + ' (' + err.message + ')';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> HANTAR BORANG';
        }
    });
</script>

</body>
</html>
