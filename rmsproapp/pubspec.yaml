name: rms_pro
description: "RMS PRO - Repair Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  firebase_app_check: ^0.3.2
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4
  firebase_storage: ^12.4.4
  shared_preferences: ^2.5.3
  font_awesome_flutter: ^10.8.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  http: ^1.3.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  dio: ^5.7.0
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  flutter_blue_plus: ^2.2.1
  # niimbot_print: ^0.0.6  # plugin broken - vendored libs missing
  mobile_scanner: ^7.2.0
  file_picker: ^8.1.7
  csv: ^6.0.0
  cloud_functions: ^5.6.2
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  flutter_nfc_kit: ^3.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/rms_logo.png"
  min_sdk_android: 21
  background_color_ios: "#0B1220"
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/rms_logo.png"
  web:
    generate: true
    image_path: "assets/rms_logo.png"
    background_color: "#0B1220"
    theme_color: "#00C47D"
  windows:
    generate: true
    image_path: "assets/rms_logo.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/
