<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Pro — POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/module.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/kerugian.css">
  <link rel="stylesheet" href="css/pos.css">
</head>
<body class="pos-page">
  <!-- Top bar -->
  <div class="pos-top">
    <div class="pos-top__left">
      <i class="fas fa-cash-register"></i>
      <strong>POS</strong>
      <span class="pos-top__shop" id="posShop">—</span>
    </div>
    <div class="pos-top__right">
      <button type="button" id="posHistoryBtn" class="pos-printer" title="Sejarah Jualan">
        <i class="fas fa-clock-rotate-left"></i>
        <span>SEJARAH</span>
      </button>
      <button type="button" id="posSettingsBtn" class="pos-printer" title="Tetapan POS">
        <i class="fas fa-gear"></i>
      </button>
      <select id="posStaff" class="pos-input" title="Staff"></select>
      <button type="button" id="posStaffDefault" class="pos-printer" title="Default staff untuk sehari">
        <i class="fas fa-check"></i>
      </button>
    </div>
  </div>

  <!-- Search + Category -->
  <div class="pos-filter">
    <div class="pos-search">
      <i class="fas fa-search"></i>
      <input type="text" id="posSearch" placeholder="Cari nama atau kod produk…">
    </div>
    <div class="pos-cats" id="posCats"></div>
  </div>

  <!-- Split: products (left) + cart (right) -->
  <div class="pos-main">
    <div class="pos-products" id="posProducts"></div>
    <div class="pos-products-empty hidden" id="posProductsEmpty">
      <i class="fas fa-box-open"></i>
      <div>Tiada produk.</div>
    </div>

    <aside class="pos-cart">
      <div class="pos-cart__head">
        <div><i class="fas fa-cart-shopping"></i> <strong>CART</strong> <span class="pos-cart__count" id="posCartCount">0</span></div>
        <button type="button" id="posCartClear" class="pos-cart__clear"><i class="fas fa-trash-can"></i></button>
      </div>
      <div class="pos-cart__list" id="posCartList"></div>
      <div class="pos-cart__empty hidden" id="posCartEmpty">Cart kosong. Klik produk untuk tambah.</div>
      <div class="pos-cart__total">
        <span>JUMLAH</span>
        <span class="pos-cart__amt" id="posCartTotal">RM 0.00</span>
      </div>
      <button type="button" class="btn-submit pos-cart__pay" id="posPayBtn" style="background:var(--primary)" disabled>
        <i class="fas fa-credit-card"></i> BAYAR
      </button>
    </aside>
  </div>

  <!-- Payment modal -->
  <div class="lost-modal-backdrop" id="posPayModal">
    <div class="lost-modal">
      <div class="lost-modal__head">
        <span style="color:var(--primary)"><i class="fas fa-credit-card"></i> BAYARAN</span>
        <button type="button" class="lost-modal__close" id="posPayClose"><i class="fas fa-xmark"></i></button>
      </div>

      <div class="pos-seg" id="posCustType">
        <button type="button" class="pos-seg__item is-active" data-type="WALK-IN">WALK-IN</button>
        <button type="button" class="pos-seg__item" data-type="ONLINE">ONLINE</button>
      </div>

      <div style="display:flex;gap:8px;">
        <button type="button" id="posCustToggleBtn" class="pos-printer" style="flex:1;justify-content:center;">
          <i class="fas fa-user-plus"></i><span>PELANGGAN</span>
        </button>
        <button type="button" id="posDiskaunBtn" class="pos-printer" style="flex:1;justify-content:center;">
          <i class="fas fa-tag"></i><span>DISKAUN</span>
        </button>
        <button type="button" id="posVoucherBtn" class="pos-printer" style="flex:1;justify-content:center;">
          <i class="fas fa-ticket"></i><span>VOUCHER</span>
        </button>
      </div>

      <div id="posCustFields" class="hidden">
        <div class="cw-2col">
          <div><label>NAMA PELANGGAN</label>
            <input type="text" id="posCustName" class="lost-input" list="posCustList">
            <datalist id="posCustList"></datalist>
          </div>
          <div><label>TELEFON</label>
            <input type="text" id="posCustTel" class="lost-input">
          </div>
        </div>
        <label>ALAMAT</label>
        <input type="text" id="posCustAlamat" class="lost-input">
      </div>

      <div id="posDiskaunWrap" class="hidden">
        <label>DISKAUN (RM)</label>
        <input type="number" id="posDiskaun" class="lost-input" min="0" step="0.10" value="0">
      </div>

      <div id="posVoucherWrap" class="hidden">
        <label>KOD VOUCHER</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="posVoucherCode" class="lost-input" style="flex:1;text-transform:uppercase;" placeholder="cth: V-XXXX">
          <button type="button" id="posVoucherApply" class="pos-printer" style="background:#2563eb;color:#fff;border-color:#2563eb;">APPLY</button>
          <button type="button" id="posVoucherReset" class="pos-printer">RESET</button>
        </div>
        <div id="posVoucherMsg" style="font-size:11px;font-weight:700;margin-top:4px;color:#64748b;">—</div>
      </div>

      <label>KAEDAH BAYARAN</label>
      <div class="pos-pay-grid" id="posPayGrid"></div>

      <div class="pos-pay-sum">
        <span>JUMLAH</span>
        <input type="number" id="posPayTotalInput" class="pos-pay-sum__amt" style="background:transparent;border:0;text-align:right;font:inherit;color:inherit;width:50%;" min="0" step="0.10">
      </div>
      <div class="pos-pay-sum" style="background:#dbeafe;">
        <span>BAYARAN</span>
        <input type="number" id="posBayaran" class="pos-pay-sum__amt" style="background:transparent;border:0;text-align:right;font:inherit;color:#2563eb;width:50%;" min="0" step="0.10" placeholder="0.00">
      </div>
      <div class="pos-pay-sum" id="posBakiRow" style="background:#fef3c7;">
        <span>BAKI</span>
        <span class="pos-pay-sum__amt" id="posBaki" style="color:#b45309;">RM 0.00</span>
      </div>

      <button type="button" class="btn-submit" id="posPayConfirm" style="background:var(--green)">
        <i class="fas fa-check"></i> SAHKAN BAYARAN
      </button>
    </div>
  </div>

  <!-- Success modal -->
  <div class="lost-modal-backdrop" id="posDoneModal">
    <div class="lost-modal lost-modal--sm" style="border-top-color:var(--green)">
      <div class="lost-modal__head"><span style="color:var(--green)"><i class="fas fa-circle-check"></i> JUALAN BERJAYA</span></div>
      <div class="pos-done">
        <div class="pos-done__siri" id="posDoneSiri">#—</div>
        <div class="pos-done__amt" id="posDoneAmt">RM 0.00</div>
        <div class="pos-done__method" id="posDoneMethod">CASH</div>
      </div>
      <div class="pos-done__status" id="posDoneStatus"></div>
      <div style="display:flex; gap:8px">
        <button type="button" class="btn-ghost" id="posDoneReprint" style="flex:1"><i class="fas fa-print"></i> CETAK SEMULA</button>
        <button type="button" class="btn-submit" id="posDoneOk" style="background:var(--primary); margin:0; flex:1">TUTUP</button>
      </div>
    </div>
  </div>

  <!-- History modal -->
  <div class="lost-modal-backdrop" id="posHistModal">
    <div class="lost-modal pos-hist-modal">
      <div class="lost-modal__head">
        <span style="color:var(--primary)"><i class="fas fa-clock-rotate-left"></i> SEJARAH JUALAN</span>
        <button type="button" class="lost-modal__close" id="posHistClose"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="pos-hist-filter">
        <div class="pos-search" style="flex:1">
          <i class="fas fa-search"></i>
          <input type="text" id="posHistSearch" placeholder="Cari siri / pelanggan / tel…">
        </div>
        <input type="date" id="posHistFrom" class="pos-input" title="Dari">
        <input type="date" id="posHistTo" class="pos-input" title="Hingga">
        <select id="posHistRange" class="pos-input">
          <option value="today">Hari Ini</option>
          <option value="week">7 Hari</option>
          <option value="month">30 Hari</option>
          <option value="custom">Julat Tersuai</option>
          <option value="all">Semua</option>
        </select>
      </div>
      <div class="pos-hist-summary" id="posHistSummary">
        <span><strong id="posHistCount">0</strong> rekod</span>
        <span>Jumlah: <strong id="posHistTotal">RM 0.00</strong></span>
        <button type="button" id="posHistPrintRange" class="pos-hist-print-range"><i class="fas fa-print"></i> CETAK JULAT</button>
      </div>
      <div class="pos-hist-list" id="posHistList"></div>
      <div class="pos-hist-empty hidden" id="posHistEmpty">Tiada jualan dijumpai.</div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="lost-modal-backdrop" id="posSettingsModal">
    <div class="lost-modal lost-modal--sm">
      <div class="lost-modal__head">
        <span style="color:var(--primary)"><i class="fas fa-gear"></i> TETAPAN POS</span>
        <button type="button" class="lost-modal__close" id="posSettingsClose"><i class="fas fa-xmark"></i></button>
      </div>
      <button type="button" id="posPrinterBtn" class="pos-printer" style="width:100%;justify-content:center;margin-bottom:8px;" title="Printer Bluetooth">
        <i class="fas fa-print"></i>
        <span id="posPrinterLbl">PRINTER</span>
      </button>
      <div class="pos-toggles">
        <label class="pos-toggle">
          <input type="checkbox" id="posAutoPrint" checked>
          <span><i class="fas fa-print"></i> Auto-Print Resit</span>
        </label>
        <label class="pos-toggle">
          <input type="checkbox" id="posTaxEnable">
          <span><i class="fas fa-percent"></i> Enable Tax</span>
        </label>
      </div>
      <div id="posTaxRow" class="hidden" style="display:flex;gap:8px;align-items:center;margin-top:8px;">
        <label style="flex:1;font-size:11px;font-weight:800;color:#64748b;">Peratus Tax (%)</label>
        <input type="number" id="posTaxPct" class="lost-input" style="width:100px;" min="0" max="100" step="0.1" value="6">
      </div>
      <label style="font-size:11px;font-weight:800;color:#64748b;margin-top:10px;display:block;">NOTA KAKI RESIT</label>
      <textarea id="posFooterNote" class="lost-input" rows="2" placeholder="cth: Terima kasih atas sokongan anda."></textarea>

      <div style="display:flex;gap:8px;margin-top:8px;">
        <button type="button" id="posPushDrawerBtn" class="pos-printer" style="flex:1;justify-content:center;" title="Push Cash Drawer">
          <i class="fas fa-cash-register"></i>
          <span>PUSH DRAWER</span>
        </button>
        <button type="button" id="posSaveSettings" class="pos-printer" style="flex:1;justify-content:center;background:#10b981;color:#fff;border-color:#10b981;" title="Simpan Tetapan">
          <i class="fas fa-floppy-disk"></i>
          <span>SIMPAN</span>
        </button>
      </div>
    </div>
  </div>

  <div class="lost-toast" id="posToast" hidden></div>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/storage-helper.js"></script>
  <script src="js/printer.js"></script>
  <script src="js/pos.js"></script>
</body>
</html>
