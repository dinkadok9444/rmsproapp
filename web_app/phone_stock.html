<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Pro — Phone Stock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/module.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/branch.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/inventory.css">
  <style>
    :root{--ps-primary:#2563eb;--ps-blue:#3b82f6;--ps-green:#10b981;--ps-red:#dc2626;--ps-yellow:#f59e0b;--ps-orange:#ea580c;--ps-cyan:#06b6d4;--ps-border:#e2e8f0;--ps-muted:#64748b;--ps-dim:#94a3b8;--ps-bg-deep:#f1f5f9;}
    .ps-topbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
    .ps-topbar button{flex:1;min-width:100px;padding:10px;border-radius:8px;border:1px solid transparent;background:#fff;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:12px;}
    .ps-btn-return{background:rgba(220,38,38,.08);color:var(--ps-red);border-color:rgba(220,38,38,.35);}
    .ps-btn-transfer{background:rgba(59,130,246,.08);color:var(--ps-blue);border-color:rgba(59,130,246,.35);}
    .ps-btn-history{background:rgba(245,158,11,.1);color:var(--ps-yellow);border-color:rgba(245,158,11,.4);}
    .ps-btn-add{background:linear-gradient(135deg,var(--ps-primary),var(--ps-blue));color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.35);border-color:transparent;}
    .ps-search-row{display:flex;align-items:center;gap:8px;background:var(--ps-bg-deep);border-radius:10px;padding:6px 10px;}
    .ps-search-row input{flex:1;border:none;background:transparent;outline:none;padding:8px 0;font:inherit;}
    .ps-search-row .ps-icn{cursor:pointer;color:var(--ps-muted);padding:4px;}
    .ps-search-row .ps-icn.active{color:var(--ps-orange);}
    .ps-filters{display:flex;gap:8px;margin-top:8px;}
    .ps-filter{flex:1;padding:6px 10px;border-radius:8px;border:1px solid;display:flex;align-items:center;gap:6px;}
    .ps-filter.model{background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.3);color:var(--ps-primary);}
    .ps-filter.kategori{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);color:var(--ps-yellow);}
    .ps-filter select{flex:1;border:none;background:transparent;color:inherit;font-weight:900;font-size:11px;outline:none;}
    .ps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px 0;}
    .ps-card{background:#fff;border-radius:12px;border:1px solid var(--ps-border);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 6px rgba(0,0,0,.04);cursor:pointer;}
    .ps-card:hover{box-shadow:0 6px 14px rgba(0,0,0,.08);}
    .ps-card__img{position:relative;aspect-ratio:1/1;background:var(--ps-bg-deep);display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .ps-card__img img{width:100%;height:100%;object-fit:cover;}
    .ps-card__img i{font-size:36px;color:var(--ps-dim);}
    .ps-badge{position:absolute;top:6px;padding:3px 6px;border-radius:4px;font-size:9px;font-weight:900;color:#fff;}
    .ps-badge.status-right{right:6px;}
    .ps-badge.kat-left{left:6px;}
    .ps-card__actions{display:flex;gap:4px;padding:6px;}
    .ps-card__actions button{flex:1;padding:6px;border-radius:6px;border:1px solid;background:rgba(0,0,0,.02);cursor:pointer;font-size:12px;}
    .ps-incoming{opacity:.6;}
    .ps-footer{margin-top:10px;padding:10px 14px;border-top:1px solid var(--ps-border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;background:#fff;border-radius:10px;}
    .ps-foot-badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:900;margin-right:4px;}
    /* Modal */
    .ps-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:1000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
    .ps-modal-bg.is-open{display:flex;}
    .ps-modal{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:16px;max-height:95vh;overflow-y:auto;}
    .ps-modal h3{margin:0 0 10px;display:flex;align-items:center;gap:8px;font-size:14px;}
    .ps-close{background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-weight:800;float:right;}
    .ps-field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
    .ps-field label{font-size:11px;font-weight:800;color:var(--ps-muted);display:flex;align-items:center;gap:6px;}
    .ps-field input,.ps-field select,.ps-field textarea{border:1px solid var(--ps-border);border-radius:8px;padding:9px;font:inherit;}
    .ps-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .ps-row-inline{display:flex;gap:6px;align-items:flex-end;}
    .ps-row-inline .ps-field{flex:1;}
    .ps-mini-btn{padding:8px 10px;border-radius:8px;border:1px solid;background:#fff;cursor:pointer;font-weight:900;font-size:10px;display:inline-flex;align-items:center;gap:4px;}
    .ps-img-drop{width:100%;height:170px;background:var(--ps-bg-deep);border-radius:12px;border:1px dashed #cbd5e1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;cursor:pointer;overflow:hidden;color:var(--ps-dim);}
    .ps-img-drop img{width:100%;height:100%;object-fit:cover;}
    .ps-status-btns{display:flex;gap:6px;flex-wrap:wrap;}
    .ps-status-btns button{padding:6px 12px;border-radius:6px;border:1px solid var(--ps-border);background:#fff;font-weight:900;cursor:pointer;font-size:10px;}
    .ps-status-btns button.active{color:#fff;}
    .ps-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
    .ps-actions button{flex:1;min-width:120px;padding:12px;border-radius:10px;border:none;cursor:pointer;font-weight:900;color:#fff;}
    .btn-save{background:var(--ps-primary);}
    .btn-del{background:rgba(220,38,38,.12);color:var(--ps-red);}
    .ps-segment{display:flex;gap:4px;margin:10px 0;}
    .ps-segment button{flex:1;padding:7px;border-radius:8px;border:1px solid var(--ps-border);background:var(--ps-bg-deep);color:var(--ps-muted);cursor:pointer;font-weight:900;font-size:10px;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
    .ps-segment button.is-active{color:#fff;}
    .ps-hist-item{background:#fff;border:1px solid var(--ps-border);border-radius:10px;padding:8px 10px;margin-bottom:6px;}
    .ps-action-badge{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:900;}
    .ps-snack{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 16px;border-radius:10px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);font-weight:700;}
    .ps-snack.err{background:#dc2626;}
    .ps-detail-row{display:flex;padding:5px 0;border-bottom:1px dashed #f1f5f9;font-size:12px;}
    .ps-detail-row b{width:100px;color:var(--ps-muted);font-weight:800;font-size:11px;}
    .ps-switch{position:relative;width:42px;height:22px;background:#cbd5e1;border-radius:999px;cursor:pointer;transition:background .2s;}
    .ps-switch.on{background:var(--ps-primary);}
    .ps-switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;}
    .ps-switch.on::after{transform:translateX(20px);}
    @media print{.no-print{display:none !important;}}
    .rms-printer-bar{position:fixed;bottom:16px;right:16px;z-index:500;}
    .pos-printer{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-weight:800;font-size:11px;cursor:pointer;color:#64748b;box-shadow:0 2px 6px rgba(0,0,0,.06);}
    .pos-printer:hover{border-color:#2563eb;color:#2563eb;}
    .pos-printer.is-on{background:#dbeafe;color:#2563eb;border-color:#2563eb;}
    .pos-printer.is-disabled{opacity:.5;cursor:not-allowed;}
  </style>
</head>
<body class="settings-page">
  <div class="rms-printer-bar no-print">
    <button type="button" id="posPrinterBtn" class="pos-printer" title="Printer">
      <i class="fas fa-print"></i><span id="posPrinterLbl">PRINTER</span>
    </button>
  </div>
  <main class="settings-container">

    <section class="settings-section">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-mobile-screen-button"></i></span>
        <h2 class="settings-section__title">Phone Stock</h2>
      </div>
      <div class="settings-section__body">
        <div class="ps-topbar">
          <button id="btnReturnList" class="ps-btn-return"><i class="fas fa-truck-ramp-box"></i> RETURN</button>
          <button id="btnTransferList" class="ps-btn-transfer"><i class="fas fa-right-left"></i> TRANSFER</button>
          <button id="btnHistory" class="ps-btn-history"><i class="fas fa-clock-rotate-left"></i> HISTORY</button>
          <button id="btnAdd" class="ps-btn-add"><i class="fas fa-plus"></i> TAMBAH</button>
        </div>
        <div class="ps-search-row">
          <i class="fas fa-search" style="color:var(--ps-muted)"></i>
          <input id="searchInput" type="search" placeholder="Cari kod, nama, IMEI...">
          <span id="clearSearch" class="ps-icn" style="display:none;"><i class="fas fa-times"></i></span>
          <span id="btnScan" class="ps-icn" title="Scan barcode (manual)"><i class="fas fa-barcode" style="color:var(--ps-primary)"></i></span>
          <span id="btnSettings" class="ps-icn" title="Tetapan"><i class="fas fa-gear"></i></span>
        </div>
        <div class="ps-filters">
          <div class="ps-filter model">
            <i class="fas fa-filter"></i>
            <select id="filterModel"><option value="SEMUA">SEMUA</option></select>
          </div>
          <div class="ps-filter kategori">
            <i class="fas fa-tag"></i>
            <select id="filterKategori"><option value="SEMUA">SEMUA</option></select>
          </div>
        </div>
      </div>
    </section>

    <section class="settings-section">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-boxes-stacked"></i></span>
        <h2 class="settings-section__title" id="listTitle">Senarai Stok</h2>
      </div>
      <div class="settings-section__body">
        <div id="psGrid" class="ps-grid"></div>
        <div id="psEmpty" style="text-align:center;padding:30px;color:var(--ps-muted);" hidden>
          <i class="fas fa-mobile-screen-button fa-2x"></i>
          <p>Tiada stok telefon</p>
        </div>
        <div id="psFooter" class="ps-footer"></div>
      </div>
    </section>
  </main>

  <!-- Generic modal container -->
  <div id="modalBg" class="ps-modal-bg"><div id="modalBox" class="ps-modal"></div></div>
  <div id="modalBg2" class="ps-modal-bg"><div id="modalBox2" class="ps-modal"></div></div>

  <input type="file" id="fileImg" accept="image/*" hidden>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/printer.js"></script>
  <script src="js/phone_stock.js"></script>
</body>
</html>
