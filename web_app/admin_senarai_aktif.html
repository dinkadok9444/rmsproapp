<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00C47D">
  <title>Senarai Aktif — Admin SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <button class="icon-btn" id="btnBack" title="Kembali"><i class="fas fa-arrow-left"></i></button>
      <span class="app-header__title"><i class="fas fa-store" style="color:var(--primary);margin-right:8px"></i>Senarai Aktif</span>
      <div class="app-header__spacer"></div>
      <button class="icon-btn" id="btnReload" title="Muat semula"><i class="fas fa-arrows-rotate"></i></button>
    </div>
  </header>

  <main class="container admin-main">
    <section class="admin-section">
      <div class="sa-toolbar">
        <input type="text" id="searchInput" placeholder="Cari nama kedai, pemilik, telefon atau ID…">
        <div class="sa-toolbar__row">
          <select id="filterNegeri"><option value="Semua">Semua Negeri</option></select>
          <select id="sortMode">
            <option value="newest">Terbaru</option>
            <option value="alpha">A-Z</option>
            <option value="expiry">Luput</option>
          </select>
          <span class="sa-count" id="countBadge">0</span>
        </div>
      </div>

      <div id="dealerList" class="dealer-list">
        <div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Memuat…</div>
      </div>

      <div id="pager" class="sa-pager hidden">
        <button id="btnPrev" class="sa-pager__btn"><i class="fas fa-chevron-left"></i></button>
        <span id="pageInfo" class="sa-pager__info">Halaman 1 / 1</span>
        <button id="btnNext" class="sa-pager__btn"><i class="fas fa-chevron-right"></i></button>
      </div>
    </section>
  </main>

  <!-- Confirm modal (generic) -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__title" id="confirmTitle">SAHKAN</div>
      <div id="confirmMsg" style="font-size:13px;color:var(--text-sub);line-height:1.4"></div>
      <div class="modal__actions">
        <button class="btn btn-muted" id="confirmCancel">BATAL</button>
        <button class="btn btn-red" id="confirmOk">TERUSKAN</button>
      </div>
    </div>
  </div>

  <!-- Detail drawer -->
  <div id="detailModal" class="modal sa-drawer hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="sa-drawer__head">
        <div class="titleWrap">
          <div class="nama" id="dNama">-</div>
          <div class="sid" id="dSid">ID: -</div>
        </div>
        <button class="sa-drawer__close" id="dClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="sa-drawer__body" id="dBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/admin_senarai_aktif.js"></script>
</body>
</html>
