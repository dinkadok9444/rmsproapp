<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D9488">
  <title>RMS Pro — Cawangan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/branch.css">
</head>
<body class="branch-page">
  <!-- Slim header: logo kiri, info, badge cawangan, logout -->
  <header class="branch-header">
    <div class="branch-header__avatar"><i class="fas fa-store"></i></div>
    <div class="branch-header__info">
      <h1 class="branch-header__shop" id="shopName">RMS PRO</h1>
      <p class="branch-header__addr" id="shopAddr">Memuatkan data kedai…</p>
    </div>
    <span class="branch-header__badge"><i class="fas fa-building"></i> <span id="shopBranch">—</span></span>
    <a class="branch-header__sup" id="btnSupSwitch" href="supervisor.html" title="Tukar Mod Supervisor">
      <i class="fas fa-user-shield"></i> SUP
    </a>
    <div class="branch-header__clock" id="branchClock">
      <span class="branch-header__time" id="hdrTime">--:--</span>
      <span class="branch-header__date" id="hdrDate">—</span>
    </div>
    <button class="branch-header__logout" id="btnLogout" title="Log Keluar"><i class="fas fa-right-from-bracket"></i></button>
  </header>

  <!-- Satu baris butang seragam (modul + tindakan pantas) -->
  <div class="branch-grid-wrap">
    <div class="branch-grid" id="branchGrid"></div>
  </div>

  <!-- Kandungan modul (load di bawah butang) -->
  <iframe class="module-frame" id="moduleFrame" title="Modul" hidden></iframe>
  <div class="module-empty" id="moduleEmpty">Pilih modul di atas untuk mula.</div>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/app.js"></script>
  <script src="js/branch-data.js"></script>
</body>
</html>
