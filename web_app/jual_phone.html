<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Pro — Jualan Telefon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/module.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/branch.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/jual_phone.css">
</head>
<body class="settings-page jualphone-page">
  <main class="settings-container">

    <!-- SEGMENT -->
    <section class="settings-section">
      <div class="settings-section__head" style="display:flex;align-items:center;gap:10px;">
        <span class="settings-section__icon"><i class="fas fa-mobile-screen"></i></span>
        <h2 class="settings-section__title" style="flex:1;">Jualan Telefon</h2>
        <button id="jpFab" style="background:#2563eb;color:#fff;border:none;border-radius:24px;padding:10px 18px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.35);white-space:nowrap;">
          <i class="fas fa-plus"></i> JUAL BARU
        </button>
      </div>
      <div class="settings-section__body">
        <div class="jp-segment" id="jpSegment">
          <button type="button" class="jp-seg-btn is-active" data-seg="CUSTOMER"><i class="fas fa-user"></i> Customer</button>
          <button type="button" class="jp-seg-btn" data-seg="DEALER"><i class="fas fa-handshake"></i> Dealer</button>
        </div>
      </div>
    </section>

    <!-- FILTER -->
    <section class="settings-section">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-filter"></i></span>
        <h2 class="settings-section__title">Tapisan</h2>
      </div>
      <div class="settings-section__body">
        <div class="set-row">
          <label class="set-label">Tempoh</label>
          <select class="set-select" id="fTime">
            <option value="SEMUA">Semua</option>
            <option value="HARI INI">Hari Ini</option>
            <option value="MINGGU INI">Minggu Ini</option>
            <option value="BULAN INI">Bulan Ini</option>
            <option value="TAHUN INI">Tahun Ini</option>
          </select>
        </div>
        <div class="set-row">
          <label class="set-label">Cari</label>
          <input class="input" type="search" id="fSearch" placeholder="Cari nama / siri / IMEI / telefon…">
        </div>
      </div>
    </section>

    <!-- LIST -->
    <section class="settings-section">
      <div class="settings-section__head" style="display:flex;align-items:center;gap:8px;">
        <span class="settings-section__icon"><i class="fas fa-list"></i></span>
        <h2 class="settings-section__title" id="listTitle" style="flex:1;">Senarai Bil Aktif</h2>
        <button type="button" id="jpArkibBtn" data-tab="ARCHIVED" title="Arkib"
          style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:5px 9px;font-size:10px;font-weight:800;color:#64748b;cursor:pointer;">
          <i class="fas fa-box-archive" style="font-size:10px;"></i> Arkib
        </button>
        <button type="button" id="jpPadamBtn" data-tab="DELETED" title="Padam" hidden
          style="display:none;align-items:center;justify-content:center;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:5px 8px;font-size:10px;font-weight:800;color:#dc2626;cursor:pointer;">
          <i class="fas fa-trash" style="font-size:10px;"></i>
        </button>
      </div>
      <div class="settings-section__body">
        <div class="jp-list" id="jpList"></div>
        <div class="jp-empty" id="jpEmpty" hidden>
          <i class="fas fa-inbox"></i>
          <p>Tiada bil dijumpai.</p>
        </div>
      </div>
    </section>

    <div id="jpCreateBg" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:14px;">
      <div id="jpCreate" style="background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h3 style="margin:0;"><i class="fas fa-receipt"></i> Buka Bil Jualan</h3>
          <button id="jpCreateClose" style="background:#fee2e2;color:#dc2626;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;">✕</button>
        </div>
        <div id="jpCreateBody"></div>
      </div>
    </div>

  </main>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/storage-helper.js"></script>
  <script src="js/jual_phone.js"></script>
</body>
</html>
