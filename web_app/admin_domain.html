<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00C47D">
  <title>Domain Management — Admin SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <button class="icon-btn" id="btnBack" title="Kembali"><i class="fas fa-arrow-left"></i></button>
      <span class="app-header__title"><i class="fas fa-globe" style="color:var(--violet);margin-right:8px"></i>Domain Management</span>
      <div class="app-header__spacer"></div>
    </div>
  </header>

  <main class="container admin-main">
    <div class="admin-hero admin-hero--violet">
      <div class="admin-hero__icon"><i class="fas fa-globe"></i></div>
      <div class="admin-hero__body">
        <div class="admin-hero__title">Domain Management</div>
        <div class="admin-hero__sub"><span id="domCount">0</span> domain aktif</div>
      </div>
      <button class="admin-hero__action" id="btnAdd"><i class="fas fa-plus"></i> Tambah</button>
    </div>

    <section class="admin-section">
      <div id="domList">
        <div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Memuat…</div>
      </div>
    </section>
  </main>

  <!-- Add domain modal -->
  <div id="addModal" class="modal hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__title" style="color:var(--violet)">TAMBAH DOMAIN</div>
      <div id="addStep1">
        <label class="modal__label">Cari dealer:</label>
        <input type="text" class="picker-search" id="dealerSearch" placeholder="Nama atau ID dealer...">
        <div class="picker-list" id="dealerList"></div>
      </div>
      <div id="addStep2" class="hidden">
        <div class="picker-chip picker-chip--violet">
          <i class="fas fa-store"></i>
          <span id="selectedName"></span>
          <button class="picker-chip__close" id="btnClearSel"><i class="fas fa-times"></i></button>
        </div>
        <label class="modal__label">Domain:</label>
        <input type="text" id="domainInput" placeholder="contoh: kedaisaya.com" style="font-family:monospace">
        <div class="modal__actions">
          <button class="btn btn-muted" id="addCancel">BATAL</button>
          <button class="btn btn-primary" id="addSave" style="background:var(--violet)">SIMPAN & SETUP</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DNS records modal -->
  <div id="dnsModal" class="modal hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__title" id="dnsTitle" style="color:var(--violet)">DNS RECORDS</div>
      <div id="dnsBody"></div>
      <div class="modal__actions">
        <button class="btn btn-muted" id="dnsClose">TUTUP</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/admin_domain.js"></script>
</body>
</html>
