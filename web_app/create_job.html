<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMS Pro — Buka Tiket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/module.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/branch.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/senarai_job.css">
  <style>
    .cj-toggle{display:flex;gap:6px;flex-wrap:wrap;}
    .cj-toggle button{flex:1;min-width:120px;padding:10px 12px;border-radius:10px;border:1px solid var(--border,#e2e8f0);background:var(--card-bg,#fff);font-weight:700;cursor:pointer;color:var(--text-muted,#64748b);}
    .cj-toggle button.is-active{background:var(--primary,#2563eb);color:#fff;border-color:var(--primary,#2563eb);}
    .cj-step{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .cj-step__dot{width:28px;height:28px;border-radius:50%;background:#e2e8f0;color:#64748b;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;}
    .cj-step__dot.is-active{background:var(--primary,#2563eb);color:#fff;}
    .cj-step__dot.is-done{background:#10b981;color:#fff;}
    .cj-step__line{flex:0 0 30px;height:2px;background:#e2e8f0;}
    .cj-item-row{display:grid;grid-template-columns:1fr 70px 110px auto;gap:6px;align-items:center;margin-bottom:6px;}
    .cj-item-row .input{width:100%;}
    .cj-del{background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;}
    .cj-add-item{margin-top:6px;padding:10px;border:1px dashed var(--border,#e2e8f0);background:transparent;border-radius:10px;width:100%;cursor:pointer;color:var(--text-muted,#64748b);font-weight:700;}
    .cj-total{display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg-subtle,#f1f5f9);border-radius:8px;margin-top:6px;font-weight:800;}
    .cj-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
    .cj-actions button{flex:1;min-width:140px;padding:12px;font-weight:800;border-radius:10px;border:none;cursor:pointer;}
    .btn-prev{background:#e2e8f0;color:#0f172a;}
    .btn-next,.btn-save{background:var(--primary,#2563eb);color:#fff;}
    .btn-save{background:#10b981;}
    .btn-reset{background:#fef3c7;color:#b45309;}
    .cj-pattern{display:grid;grid-template-columns:repeat(3,60px);gap:8px;justify-content:center;padding:10px;user-select:none;}
    .cj-pattern-dot{width:60px;height:60px;border-radius:50%;background:#e2e8f0;display:inline-flex;align-items:center;justify-content:center;font-weight:900;cursor:pointer;}
    .cj-pattern-dot.is-on{background:var(--primary,#2563eb);color:#fff;}
    .cj-cust-hit{padding:8px;border-bottom:1px solid var(--border,#e2e8f0);cursor:pointer;}
    .cj-cust-hit:hover{background:var(--bg-subtle,#f1f5f9);}
    .cj-snap{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .cj-snap-card{height:140px;border:1px dashed var(--border,#e2e8f0);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text-muted,#64748b);cursor:pointer;background-size:cover;background-position:center;}
    .cj-badge{display:inline-block;padding:3px 8px;background:#10b98133;color:#059669;border-radius:6px;font-weight:800;font-size:12px;margin-left:8px;}
    .cj-snack{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 16px;border-radius:10px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);}
    .cj-snack.err{background:#dc2626;}
    .rms-printer-bar{position:fixed;bottom:16px;right:16px;z-index:500;}
    .pos-printer{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-weight:800;font-size:11px;cursor:pointer;color:#64748b;box-shadow:0 2px 6px rgba(0,0,0,.06);}
    .pos-printer:hover{border-color:#2563eb;color:#2563eb;}
    .pos-printer.is-on{background:#dbeafe;color:#2563eb;border-color:#2563eb;}
    .pos-printer.is-disabled{opacity:.5;cursor:not-allowed;}
  </style>
</head>
<body class="settings-page createjob-page">
  <div class="rms-printer-bar">
    <button type="button" id="posPrinterBtn" class="pos-printer" title="Printer">
      <i class="fas fa-print"></i><span id="posPrinterLbl">PRINTER</span>
    </button>
  </div>
  <main class="settings-container">

    <section class="settings-section">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-file-invoice"></i></span>
        <h2 class="settings-section__title">Buka Tiket <span id="siriBadge" class="cj-badge" hidden></span></h2>
      </div>
      <div class="settings-section__body">
        <div class="cj-step" id="stepIndicator"></div>
      </div>
    </section>

    <!-- STEP 1: CUSTOMER -->
    <section class="settings-section" data-step="0">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-user"></i></span>
        <h2 class="settings-section__title">Pelanggan</h2>
      </div>
      <div class="settings-section__body">
        <div class="cj-toggle" id="custTypeToggle">
          <button type="button" data-v="NEW CUST" class="is-active"><i class="fas fa-user-plus"></i> NEW CUST</button>
          <button type="button" data-v="REGULAR"><i class="fas fa-user-check"></i> REGULAR</button>
        </div>

        <div class="set-row" id="custSearchRow" hidden>
          <label class="set-label"><i class="fas fa-search"></i> Cari Pelanggan</label>
          <input class="input" id="custSearch" placeholder="Nama / telefon…">
          <div id="custHits" style="margin-top:6px;max-height:200px;overflow:auto;border:1px solid var(--border,#e2e8f0);border-radius:8px;" hidden></div>
        </div>

        <div class="set-row"><label class="set-label"><i class="fas fa-user"></i> Nama Pelanggan</label><input class="input" id="nama" placeholder="Masuk nama"></div>
        <div class="set-row"><label class="set-label"><i class="fas fa-phone"></i> No Telefon</label><input class="input" id="tel" placeholder="011..." inputmode="tel"></div>
        <div class="set-row"><label class="set-label"><i class="fab fa-whatsapp"></i> No Backup (WhatsApp)</label><input class="input" id="telWasap" placeholder="Opsyenal" inputmode="tel"></div>
        <div class="set-row"><label class="set-label"><i class="fas fa-mobile-alt"></i> Model Telefon</label><input class="input" id="model" placeholder="Contoh: IPHONE 12"></div>

        <div class="set-row"><label class="set-label"><i class="fas fa-calendar"></i> Tarikh Masuk</label><input class="input" id="tarikh" type="datetime-local"></div>
      </div>
    </section>

    <!-- STEP 2: DEVICE / ITEMS -->
    <section class="settings-section" data-step="1">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-screwdriver-wrench"></i></span>
        <h2 class="settings-section__title">Kerosakan & Item</h2>
      </div>
      <div class="settings-section__body">
        <div class="set-row">
          <label class="set-label"><i class="fas fa-tools"></i> Jenis Servis</label>
          <select class="set-select" id="jenisServis">
            <option>TAK PASTI</option><option>SIAP SEGERA</option><option>TINGGAL</option>
          </select>
        </div>
        <div class="set-row">
          <label class="set-label"><i class="fas fa-lock"></i> Password / Pattern</label>
          <input class="input" id="password" placeholder="Password telefon">
          <div id="patternBox" class="cj-pattern"></div>
          <div style="text-align:center;font-size:12px;color:var(--text-muted,#64748b);">Pattern: <span id="patternTxt">-</span> <button type="button" id="patternClear" style="margin-left:8px;"><i class="fas fa-eraser"></i> Clear</button></div>
        </div>

        <label class="set-label"><i class="fas fa-list"></i> Senarai Item / Servis</label>
        <div id="itemsWrap"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
          <button type="button" class="cj-add-item" id="addItem" style="margin-top:0;"><i class="fas fa-plus"></i> Tambah Manual</button>
          <button type="button" class="cj-add-item" id="addFromStock" style="margin-top:0;"><i class="fas fa-boxes-stacked"></i> Tambah dari Stok</button>
        </div>
        <div id="stockUsageList" style="margin-top:6px;font-size:11px;color:var(--text-muted,#64748b);"></div>

        <div class="cj-total"><span><i class="fas fa-money-bill"></i> Jumlah Harga</span><span id="totalHarga">RM 0.00</span></div>

        <div class="set-row"><label class="set-label"><i class="fas fa-sticky-note"></i> Catatan</label><textarea class="input" id="catatan" rows="3" placeholder="Nota tambahan..."></textarea></div>
      </div>
    </section>

    <!-- STEP 3: PAYMENT + STAFF + IMAGES -->
    <section class="settings-section" data-step="2">
      <div class="settings-section__head">
        <span class="settings-section__icon"><i class="fas fa-money-bill-wave"></i></span>
        <h2 class="settings-section__title">Bayaran & Staff</h2>
      </div>
      <div class="settings-section__body">
        <div class="set-row"><label class="set-label"><i class="fas fa-hand-holding-usd"></i> Deposit</label><input class="input" id="deposit" type="number" step="0.01" value="0"></div>
        <div class="set-row"><label class="set-label"><i class="fas fa-percent"></i> Diskaun</label><input class="input" id="diskaun" type="number" step="0.01" value="0"></div>
        <div class="set-row"><label class="set-label"><i class="fas fa-ticket-alt"></i> Kod Voucher / Referral</label><input class="input" id="promo" placeholder="V-XXXX / REF-XXXX"><button type="button" id="applyPromo" class="cj-add-item" style="margin-top:4px;"><i class="fas fa-check"></i> Semak</button><div id="promoMsg" style="font-size:12px;color:var(--text-muted);"></div></div>

        <div class="set-row">
          <label class="set-label"><i class="fas fa-credit-card"></i> Status Bayaran</label>
          <select class="set-select" id="paymentStatus"><option>UNPAID</option><option>PAID</option></select>
        </div>
        <div class="set-row">
          <label class="set-label"><i class="fas fa-money-bill"></i> Cara Bayaran</label>
          <select class="set-select" id="caraBayaran"><option>CASH</option><option>ONLINE</option><option>QR</option><option selected>TAK PASTI</option></select>
        </div>
        <div class="set-row">
          <label class="set-label"><i class="fas fa-user-check"></i> Staff Terima</label>
          <select class="set-select" id="staffTerima"></select>
        </div>

        <label class="set-label"><i class="fas fa-image"></i> Gambar Sebelum (Gallery Addon)</label>
        <div class="cj-snap" id="snapWrap">
          <div class="cj-snap-card" data-k="depan"><i class="fas fa-camera fa-2x"></i><div>DEPAN</div></div>
          <div class="cj-snap-card" data-k="belakang"><i class="fas fa-camera fa-2x"></i><div>BELAKANG</div></div>
        </div>
        <input type="file" id="fileDepan" accept="image/*" hidden>
        <input type="file" id="fileBelakang" accept="image/*" hidden>
      </div>
    </section>

    <section class="settings-section">
      <div class="settings-section__body">
        <div class="cj-actions">
          <button type="button" class="btn-prev" id="btnPrev"><i class="fas fa-arrow-left"></i> Sebelum</button>
          <button type="button" class="btn-next" id="btnNext">Seterusnya <i class="fas fa-arrow-right"></i></button>
          <button type="button" class="btn-save" id="btnSave" hidden><i class="fas fa-save"></i> Simpan Tiket</button>
          <button type="button" class="btn-reset" id="btnReset" hidden><i class="fas fa-rotate"></i> Tiket Baru</button>
        </div>
      </div>
    </section>

  </main>  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/storage-helper.js"></script>
  <script src="js/printer.js"></script>
  <script src="js/create_job.js"></script>
</body>
</html>
