<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00C47D">
  <title>Feedback — Admin SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <button class="icon-btn" id="btnBack" title="Kembali"><i class="fas fa-arrow-left"></i></button>
      <span class="app-header__title"><i class="fas fa-comment-dots" style="color:var(--primary);margin-right:8px"></i>Feedback Pengguna</span>
      <div class="app-header__spacer"></div>
    </div>
  </header>

  <main class="container admin-main">
    <div class="admin-tabs">
      <button class="admin-tab is-active" data-status="open">TERBUKA <span class="admin-tab__count" id="cntOpen">0</span></button>
      <button class="admin-tab" data-status="resolved">SELESAI <span class="admin-tab__count" id="cntResolved">0</span></button>
    </div>
    <section class="admin-section">
      <div id="fbList" class="fb-list">
        <div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Memuat…</div>
      </div>
    </section>
  </main>

  <!-- Resolve dialog -->
  <div id="resolveModal" class="modal hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__title" style="color:var(--green)">TANDA SELESAI</div>
      <label class="modal__label">Nota balasan (pilihan):</label>
      <textarea id="resolveNote" rows="3" placeholder="Contoh: Sudah diperbaiki dalam versi 1.2.0"></textarea>
      <div class="modal__actions">
        <button class="btn btn-muted" id="resolveCancel">BATAL</button>
        <button class="btn btn-green" id="resolveOk">SELESAI</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/admin_saas_feedback.js"></script>
</body>
</html>
