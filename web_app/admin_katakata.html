<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00C47D">
  <title>Kata-Kata — Admin SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <button class="icon-btn" id="btnBack"><i class="fas fa-arrow-left"></i></button>
      <span class="app-header__title"><i class="fas fa-quote-left" style="color:var(--indigo);margin-right:8px"></i>Kata-Kata Hari Ini</span>
      <div class="app-header__spacer"></div>
    </div>
  </header>

  <main class="container admin-main">
    <p class="admin-hint" style="margin:0 0 var(--sp-3)">Hebahkan motivasi dan nasihat solat kepada semua dealer.</p>

    <div id="kkLoading" class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Memuat…</div>

    <div id="kkContent" class="kk-grid hidden">
      <!-- MOTIVASI -->
      <div class="kk-card kk-card--motivasi">
        <div class="kk-card__head">
          <span class="kk-card__icon"><i class="fas fa-lightbulb"></i></span>
          <div>
            <div class="kk-card__title">Motivasi Harian</div>
            <div class="kk-card__sub">Kata-kata semangat untuk dealer</div>
          </div>
        </div>
        <textarea id="txtMotivasi" rows="6" placeholder="Tulis motivasi hari ini..."></textarea>
        <div class="kk-card__stamp"><i class="fas fa-clock"></i> Kemaskini: <span id="tsMotivasi">-</span></div>
        <button class="btn btn-indigo kk-save" data-target="motivasi">
          <i class="fas fa-bullhorn"></i> HEBAHKAN MOTIVASI
        </button>
      </div>

      <!-- SOLAT -->
      <div class="kk-card kk-card--solat">
        <div class="kk-card__head">
          <span class="kk-card__icon"><i class="fas fa-hands-praying"></i></span>
          <div>
            <div class="kk-card__title">Nasihat Solat</div>
            <div class="kk-card__sub">Peringatan solat untuk dealer</div>
          </div>
        </div>
        <textarea id="txtSolat" rows="6" placeholder="Tulis nasihat solat hari ini..."></textarea>
        <div class="kk-card__stamp"><i class="fas fa-clock"></i> Kemaskini: <span id="tsSolat">-</span></div>
        <button class="btn btn-green kk-save" data-target="solat">
          <i class="fas fa-bullhorn"></i> HEBAHKAN NASIHAT SOLAT
        </button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/admin_katakata.js"></script>
</body>
</html>
