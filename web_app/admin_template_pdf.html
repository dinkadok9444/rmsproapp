<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7C3AED">
  <title>Template PDF — Admin SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <button class="icon-btn" id="btnBack" title="Kembali"><i class="fas fa-arrow-left"></i></button>
      <span class="app-header__title"><i class="fas fa-file-pdf" style="color:#7C3AED;margin-right:8px"></i>Template PDF</span>
      <div class="app-header__spacer"></div>
    </div>
  </header>

  <main class="container admin-main">
    <div class="tpl-hero">
      <div class="tpl-hero__icon"><i class="fas fa-file-pdf"></i></div>
      <div class="tpl-hero__body">
        <div class="tpl-hero__title">TEMPLATE PDF</div>
        <div class="tpl-hero__sub">Buka PDF → Screenshot → Upload</div>
      </div>
      <span class="tpl-hero__count" id="tplCount">0 / 10</span>
      <button class="tpl-hero__refresh" id="btnRefresh" title="Refresh"><i class="fas fa-arrows-rotate"></i></button>
    </div>

    <div id="tplList" class="tpl-list">
      <div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Memuat…</div>
    </div>
  </main>

  <input type="file" id="filePicker" accept="image/*" class="hidden">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/admin_template_pdf.js"></script>
</body>
</html>
