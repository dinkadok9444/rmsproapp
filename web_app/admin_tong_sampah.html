<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00C47D">
  <title>Tong Sampah — Admin SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <button class="icon-btn" id="btnBack"><i class="fas fa-arrow-left"></i></button>
      <span class="app-header__title"><i class="fas fa-trash-can" style="color:var(--red);margin-right:8px"></i>Tong Sampah</span>
      <div class="app-header__spacer"></div>
      <span id="countMeta" class="admin-meta" style="padding:0 8px 0 0"></span>
      <button class="icon-btn" id="btnReload"><i class="fas fa-arrows-rotate"></i></button>
    </div>
  </header>

  <main class="container admin-main">
    <section class="admin-section">
      <div class="admin-meta" id="meta">Memuat…</div>
      <div id="list" class="trash-list">
        <div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Memuat…</div>
      </div>
    </section>
  </main>

  <!-- Permanent delete confirm modal -->
  <div id="confirmModal" class="modal hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <div class="modal__title" style="color:var(--red)"><i class="fas fa-triangle-exclamation"></i> PADAM KEKAL</div>
      <p style="color:var(--text-sub);font-size:12px;margin:0 0 12px">Tindakan ini TIDAK boleh dibatalkan. Data akan dipadam sepenuhnya.</p>
      <label class="modal__label">Taipkan PADAM untuk mengesahkan:</label>
      <input type="text" id="confirmInput" placeholder="PADAM" style="text-align:center;letter-spacing:2px;color:var(--red);font-weight:900">
      <div class="modal__actions">
        <button class="btn btn-muted" id="confirmCancel">BATAL</button>
        <button class="btn btn-red" id="confirmOk">PADAM KEKAL</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/admin_tong_sampah.js"></script>
</body>
</html>
